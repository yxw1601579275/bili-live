name: Sleep Aid Live (Dynamic Audio Wave)

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  push-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Video File
        id: cache-video
        uses: actions/cache@v3
        with:
          path: video.mp4
          key: rain-video-v1

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core 

      - name: Download Video (Only if not cached)
        if: steps.cache-video.outputs.cache-hit != 'true'
        run: |
          wget -c -O video.mp4 "https://objectstorageapi.ap-southeast-1.clawcloudrun.com/szi722v0-mine/video.mp4" 

      - name: Stream with Natural Wind Effect
        run: |
          echo "开启助眠防封推流（动态声波模式）..."
          (while true; do echo "--- [$(date +'%H:%M:%S')] 雨声助眠直播正常运行 ---"; sleep 300; done) &
          
          export TZ="Asia/Shanghai"
          
          timeout 5.5h bash -c '
            while true; do
              # 【已修复】tremolo 频率 f 设定为合法最小值 0.1
              # 【已优化】移除锁码率参数，解除网络带宽强限制
              ffmpeg -re -i video.mp4 \
                -r 30 \
                -vf "noise=alls=2:allf=t,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='\''%{localtime\:%H\\\\\:%M\\\\\:%S}'\'':x=w-220:y=30:fontsize=26:fontcolor=white:shadowcolor=black:shadowx=2" \
                -af "tremolo=f=0.1:d=0.1" \
                -c:v libx264 -preset veryfast \
                -pix_fmt yuv420p -g 60 -keyint_min 60 -sc_threshold 0 \
                -c:a aac -b:a 128k -ar 44100 \
                -map_metadata -1 -metadata service_provider="OBS" -metadata encoder="OBS x264 encoder" \
                -loglevel error \
                -f flv "${{ secrets.BILI_RTMP }}" 
          
              echo "推流重置，5秒后重连..."
              sleep 5
            done
          ' || true