name: 24H Stable Live (Cache & Clean Log)

on:
  schedule:
    - cron: '0 */5 * * *' # 每5小时自动重启一次
  workflow_dispatch:      # 允许手动随时启动

jobs:
  push-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 【进阶】检查并读取 1GB 视频缓存
      - name: Cache Video File
        id: cache-video
        uses: actions/cache@v3
        with:
          path: video.mp4
          key: video-v1 # 如果你以后更换了视频文件，只需把 v1 改成 v2

      - name: Install FFmpeg and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      # 【进阶】只有在缓存没命中时才下载视频
      - name: Download Video (Only if not cached)
        if: steps.cache-video.outputs.cache-hit != 'true'
        run: |
          echo "缓存未命中，正在执行首次下载..."
          wget -c -O video.mp4 "https://objectstorageapi.ap-southeast-1.clawcloudrun.com/szi722v0-mine/video.mp4"

      - name: Stream with Clean Logs
        run: |
          echo "视频准备就绪，开启防检测模式推流..."
          # 后台运行心跳进程，每 5 分钟打印一次日志，防止 Actions 页面看起来像死机
          (while true; do echo "--- [$(date +'%H:%M:%S')] 直播推流中，运行正常 ---"; sleep 300; done) &
          
          timeout 5.5h bash -c '
            while true; do
              # 核心功能：动态噪点干扰 + 实时时间水印 + 深度元数据伪装
              # 移除 -b:v 参数实现不锁码率
              ffmpeg -re -i video.mp4 \
                -vf "noise=alls=3:allf=t,drawtext=fontfile=/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf:text='\''%{localtime\:%H\\\\\:%M\\\\\:%S}'\'':x=w-220:y=30:fontsize=26:fontcolor=white:shadowcolor=black:shadowx=2" \
                -c:v libx264 -preset veryfast \
                -g 60 -c:a aac -b:a 128k -ar 44100 \
                -map_metadata -1 \
                -metadata service_provider="OBS" \
                -metadata encoder="OBS x264 encoder" \
                -loglevel error \
                -f flv "${{ secrets.BILI_RTMP }}" 
          
              echo "检测到推流意外断开，5秒后自动重连..."
              sleep 5
            done
          ' || true